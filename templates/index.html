<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threat Detection System</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <div class="card">

        <h1>🛡️ Threat Detection System</h1>

        <p class="subtitle">
            AI-powered privacy preserving threat analyzer
        </p>

        <input
            type="text"
            id="query"
            placeholder="Enter your query..."
        >

        <div class="button-group">
            <button onclick="analyze()">
                Analyze
            </button>

            <button class="reset-btn" onclick="resetDetector()">
                Reset
            </button>
        </div>

        <div id="output" class="output-box">
            Results will appear here...
        </div>

    </div>

</div>

<script>

async function analyze(){

    let q = document.getElementById("query").value;

    let res = await fetch('/analyze', {

        method: 'POST',

        headers: {
            'Content-Type': 'application/json'
        },

        body: JSON.stringify({
            query: q
        })

    });

    let data = await res.json();

    document.getElementById("output").innerHTML = `

        <div class="result-item">
            <span>🚨 Alert:</span>
            ${data.alert}
        </div>

        <div class="result-item">
            <span>⚠️ Risk:</span>
            ${data.risk}
        </div>

        <div class="result-item">
            <span>📊 Score:</span>
            ${data.reason.score}
        </div>

        <div class="result-item">
            <span>🔑 Keywords:</span>
            ${data.reason.keywords_detected}
        </div>

    `;
}

async function resetDetector(){

    await fetch('/reset', {
        method:'POST'
    });

    document.getElementById("output").innerHTML =
        "System reset completed.";
}

</script>

</body>
</html>
